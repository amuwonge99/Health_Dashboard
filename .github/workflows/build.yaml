name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - '.github/workflows/build.yaml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    name: Build and Push to ECR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: tag
        run: echo "IMAGE_TAG=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: docker build -t gatus:${{ steps.tag.outputs.IMAGE_TAG }} ./app

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: gatus:${{ steps.tag.outputs.IMAGE_TAG }}
          format: table
          exit-code: 0
          severity: HIGH,CRITICAL

      - name: Push to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.tag.outputs.IMAGE_TAG }}
        run: |
          docker tag gatus:$IMAGE_TAG $ECR_REGISTRY/gatus:$IMAGE_TAG
          docker tag gatus:$IMAGE_TAG $ECR_REGISTRY/gatus:latest
          docker push $ECR_REGISTRY/gatus:$IMAGE_TAG
          docker push $ECR_REGISTRY/gatus:latest

      - name: Job summary
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.tag.outputs.IMAGE_TAG }}
        run: |
          echo "## Docker Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Image: \`$ECR_REGISTRY/gatus:$IMAGE_TAG\`" >> $GITHUB_STEP_SUMMARY
          echo "- Tag: \`$IMAGE_TAG\`" >> $GITHUB_STEP_SUMMARY
          echo "- Status: Success" >> $GITHUB_STEP_SUMMARY